<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAGE - Technical Maintenance</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }
    
    .container {
      text-align: center;
      padding: 40px;
      position: relative;
    }
    
    .logo {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: 15px;
      background: linear-gradient(135deg, #e94560, #ff6b6b, #e94560);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 30px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.02); }
    }
    
    .title {
      font-size: 32px;
      color: #ffffff;
      margin-bottom: 20px;
      font-weight: 600;
    }
    
    .message {
      font-size: 18px;
      color: #a0a0a0;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(233, 69, 96, 0.2);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .eta {
      margin-top: 30px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">RAGE</div>
    <div class="title">Technical Maintenance</div>
    <div class="message">
      We're currently performing scheduled maintenance.<br>
      We'll be back shortly.
    </div>
    <div class="spinner"></div>
    <div class="eta">Estimated time: Soon</div>
  </div>
</body>
</html>
